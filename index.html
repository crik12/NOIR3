<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NOIR — Music Player</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">NOIR</div>
      <button class="sidebar-toggle" id="sidebarToggle" title="Ocultar sidebar">&#9776;</button>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-btn active" data-view="home">
        <span class="nav-icon">&#9654;</span> Inicio
      </button>
      <button class="nav-btn" data-view="search">
        <span class="nav-icon">&#128269;</span> Buscar
      </button>
      <button class="nav-btn" data-view="library">
        <span class="nav-icon">&#127925;</span> Biblioteca
      </button>
    </nav>

    <div class="sidebar-section">
      <div class="section-header">
        <span>Mis Playlists</span>
        <button class="btn-icon" id="newPlaylistBtn" title="Nueva playlist">&#43;</button>
      </div>

      <ul class="playlist-list" id="playlistList">
        <!-- Playlists generadas dinámicamente -->
      </ul>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main" id="mainContent">

    <!-- TOP BAR -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="btn-icon nav-arrow" id="goBack">&#8592;</button>
        <button class="btn-icon nav-arrow" id="goForward">&#8594;</button>
      </div>
      <div class="search-bar" id="searchBar" style="display:none;">
        <span class="search-icon">&#128269;</span>
        <input type="text" id="searchInput" placeholder="Busca canciones, artistas..."/>
      </div>
      <div class="topbar-right">
        <div class="user-badge">U</div>
      </div>
    </header>

    <!-- HOME VIEW -->
    <div class="view active" id="view-home">
      <section class="hero-section">
        <h1 class="hero-title">Buenas noches<span class="dot">.</span></h1>
        <p class="hero-sub">Tu música, tu mundo.</p>
      </section>

      <section class="section">
        <h2 class="section-title">Reproducción reciente</h2>
        <div class="card-grid" id="recentGrid">
          <!-- Cards generadas dinámicamente -->
        </div>
      </section>

      <section class="section">
        <h2 class="section-title">Todas las canciones</h2>
        <div class="track-list" id="homeTrackList">
          <!-- Tracks generados dinámicamente -->
        </div>
      </section>
    </div>

    <!-- SEARCH VIEW -->
    <div class="view" id="view-search">
      <section class="section">
        <h2 class="section-title">Resultados de búsqueda</h2>
        <div class="track-list" id="searchResults">
          <p class="empty-msg">Escribe algo para buscar...</p>
        </div>
      </section>
    </div>

    <!-- LIBRARY VIEW -->
    <div class="view" id="view-library">
      <section class="section">
        <h2 class="section-title">Biblioteca</h2>
        <div class="track-list" id="libraryList">
          <!-- Tracks generados dinámicamente -->
        </div>
      </section>
    </div>

    <!-- PLAYLIST VIEW -->
    <div class="view" id="view-playlist">
      <section class="playlist-hero" id="playlistHero">
        <div class="playlist-cover-big" id="playlistCoverBig"></div>
        <div class="playlist-info">
          <span class="playlist-label">PLAYLIST</span>
          <h1 class="playlist-name" id="playlistViewName">—</h1>
          <p class="playlist-meta" id="playlistViewMeta">0 canciones</p>
          <div class="playlist-actions">
            <button class="btn-primary" id="playPlaylistBtn">&#9654; Reproducir</button>
            <button class="btn-icon-lg" id="shufflePlaylistBtn" title="Aleatorio">&#8646;</button>
            <button class="btn-icon-lg danger" id="deletePlaylistBtn" title="Eliminar playlist">&#128465;</button>
          </div>
        </div>
      </section>
      <div class="track-list" id="playlistTrackList"></div>
    </div>

  </main>

  <!-- PLAYER BAR -->
  <footer class="player-bar" id="playerBar">

    <!-- Song Info -->
    <div class="player-info">
      <div class="player-cover" id="playerCover">
        <div class="cover-placeholder">&#9835;</div>
      </div>
      <div class="player-meta">
        <span class="player-title" id="playerTitle">Sin reproducción</span>
        <span class="player-artist" id="playerArtist">—</span>
      </div>
      <button class="btn-icon fav-btn" id="favBtn" title="Me gusta">&#9825;</button>
    </div>

    <!-- Controls -->
    <div class="player-center">
      <div class="player-controls">
        <button class="ctrl-btn" id="shuffleBtn" title="Aleatorio">&#8646;</button>
        <button class="ctrl-btn" id="prevBtn" title="Anterior">&#9664;&#9664;</button>
        <button class="ctrl-btn play-btn" id="playPauseBtn" title="Play/Pause">&#9654;</button>
        <button class="ctrl-btn" id="nextBtn" title="Siguiente">&#9654;&#9654;</button>
        <button class="ctrl-btn" id="repeatBtn" title="Repetir">&#8635;</button>
      </div>
      <div class="progress-wrap">
        <span class="time-label" id="currentTime">0:00</span>
        <div class="progress-bar-wrap" id="progressWrap">
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressFill"></div>
            <input type="range" class="progress-range" id="progressRange" min="0" max="100" value="0" />
          </div>
        </div>
        <span class="time-label" id="totalTime">0:00</span>
      </div>
    </div>

    <!-- Volume -->
    <div class="player-right">
      <button class="ctrl-btn" id="addToPlaylistBtn" title="Agregar a playlist">&#43;</button>
      <button class="ctrl-btn" id="muteBtn" title="Silenciar">&#128266;</button>
      <div class="volume-wrap">
        <input type="range" class="volume-range" id="volumeRange" min="0" max="100" value="70" />
      </div>
      <span class="vol-label" id="volLabel">70</span>
    </div>

  </footer>

  <!-- MODAL: Nueva Playlist -->
  <div class="modal-overlay" id="newPlaylistModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Nueva Playlist</h3>
        <button class="modal-close" id="closeNewPlaylist">&#215;</button>
      </div>
      <div class="modal-body">
        <label class="field-label">Nombre</label>
        <input type="text" class="modal-input" id="playlistNameInput" placeholder="Mi playlist..." maxlength="40"/>
        <div class="modal-actions">
          <button class="btn-ghost" id="cancelNewPlaylist">Cancelar</button>
          <button class="btn-primary" id="confirmNewPlaylist">Crear</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL: Agregar a Playlist -->
  <div class="modal-overlay" id="addToPlaylistModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Agregar a Playlist</h3>
        <button class="modal-close" id="closeAddModal">&#215;</button>
      </div>
      <div class="modal-body">
        <p class="modal-sub" id="addModalSongName">—</p>
        <ul class="modal-playlist-list" id="modalPlaylistList"></ul>
        <div class="modal-actions">
          <button class="btn-ghost" id="cancelAddModal">Cancelar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="data.js"></script>
  <script src="player.js"></script>
  <script src="ui.js"></script>
  <script src="app.js"></script>
</body>
</html>
